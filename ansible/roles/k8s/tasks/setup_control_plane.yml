
- name: fix CRI errors
  ansible.builtin.command:
    cmd: containerd config default
  register: containerd_config

- name: Create containerd config file
  ansible.builtin.copy:
    content: "{{ containerd_config.stdout }}"
    dest: /etc/containerd/config.toml
    owner: root
    group: root
    mode: '0644'

- name: enable systemd cgroup for containerd
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    search_string: 'SystemdCgroup = false'
    line: 'SystemdCgroup = true'
    state: present

- name: restart containerd
  ansible.builtin.systemd:
    name: containerd
    state: restarted

- name: restart kubelet
  ansible.builtin.systemd:
    name: kubelet
    state: restarted

- name: Check if kubeadm is already initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_init_result

- name: Run kubeadm init to setup control plane
  ansible.builtin.command:
    cmd: kubeadm init --pod-network-cidr={{ pod_network_cidr }} --ignore-preflight-errors=NumCPU,Mem
  when: not kubeadm_init_result.stat.exists

- name: Create .kube directory
  ansible.builtin.file:
    path: /home/ec2-user/.kube
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: '0700'

- name: Copy kubeconfig to user
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ec2-user/.kube/config
    owner: ec2-user
    group: ec2-user
    mode: '0600'
    remote_src: yes
  notify: restart kubelet

- name: Force kubelet restart
  ansible.builtin.meta: flush_handlers

- name: Install Calico CNI
  ansible.builtin.command:
    cmd: kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.27.0/manifests/calico.yaml

- name: Install helm
  ansible.builtin.command:
    cmd: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-4 | bash

- name: add nginx repo
  ansible.builtin.command:
    cmd: helm repo add nginx-stable https://helm.nginx.com/stable

- name: update helm repo
  ansible.builtin.command:
    cmd: helm repo update

- name: install nginx ingress
  ansible.builtin.command:
    cmd: helm install my-ingress nginx-stable/nginx-ingress


